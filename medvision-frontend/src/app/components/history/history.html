        <div class="card">
            <p-table [value]="result()" [paginator]="true" [rows]="8">
                <ng-template #header>
                    <tr>
                        <th>Id</th>
                        <th>Prediction</th>
                        <th>Confidence</th>
                        <th>ModelVersion</th>
                        <th>CreatedAt</th>
                        <th>Heatmap</th>
                    </tr>
                </ng-template>
                <ng-template #body let-item>
                    <tr>
                        <td>{{ item.id }}</td>
                        <td><p-tag [severity]="item.prediction=='NORMAL'?'success' :'danger'">{{  item.prediction}}</p-tag></td>
                        <td><p-tag severity="info">{{  item.confidence * 100 | number:'1.0-2'}}</p-tag></td>
                        <td>{{  item.modelVersion }}</td>
                        <td>{{ item.createdAt | date:'medium'}}</td>

                        <td><button pButton icon="pi pi-eye" label="View" (click)="openHeatmap(item.heatmapUrl)"></button></td>
                    </tr>
                   
                </ng-template>
            </p-table>
        </div>

        <p-dialog header="Heatmap" [(visible)]="dialogvisible" [modal]="true" [style]="{width: '50vw'}">
            <img [src]="imagesrc" alt="Heatmap Image"
           
            style="width: 100%">
        </p-dialog>
